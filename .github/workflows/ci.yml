name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run check
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - name: Upload UI bundle
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build
          retention-days: 1

  clippy:
    runs-on: ubuntu-latest
    needs: [web]
    env:
      OMP_SKIP_UI_BUILD: '1'
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Download UI bundle
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/build
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    needs: [web]
    env:
      OMP_SKIP_UI_BUILD: '1'
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Download UI bundle
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/build
      - run: cargo test --workspace --all-targets
      # Sanity: gateway also builds without the embedded UI, so backend-only
      # contributors (no Node) aren't blocked by the default feature.
      - run: cargo build -p omp-gateway --no-default-features

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.2
      - run: helm lint charts/omp -f charts/omp/values-dev.yaml
      - run: helm template omp charts/omp -f charts/omp/values-dev.yaml > /tmp/rendered.yaml
      - name: Render is non-empty
        run: test -s /tmp/rendered.yaml

  docker-build:
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test, helm-lint]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: omp:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
