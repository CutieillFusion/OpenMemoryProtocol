file_type = "wav"
mime_patterns = ["audio/wav", "audio/x-wav", "audio/wave"]

[fields.byte_size]
source = "probe"
probe = "file.size"
type = "int"

[fields.sha256]
source = "probe"
probe = "file.sha256"
type = "string"

[fields.mime]
source = "probe"
probe = "file.mime"
type = "string"

[fields.duration_seconds]
source = "probe"
probe = "audio.duration_seconds"
type = "float"

[render]
kind = "binary"
