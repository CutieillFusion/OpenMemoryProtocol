file_type = "pdf"
mime_patterns = ["application/pdf"]

[fields.byte_size]
source = "probe"
probe = "file.size"
type = "int"

[fields.sha256]
source = "probe"
probe = "file.sha256"
type = "string"

[fields.mime]
source = "probe"
probe = "file.mime"
type = "string"

[fields.page_count]
source = "probe"
probe = "pdf.page_count"
type = "int"

[render]
kind = "binary"
